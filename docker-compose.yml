services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clockwork
      POSTGRES_PASSWORD: clockwork
      POSTGRES_DB: clockwork
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clockwork -d clockwork"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  clockwork-api:
    build:
      context: .
      args:
        SERVICE: api
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://clockwork:clockwork@postgres:5432/clockwork?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PARTITION_COUNT: "16"
      MAX_RETRIES: "3"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  scheduler:
    build:
      context: .
      args:
        SERVICE: scheduler
    environment:
      DATABASE_URL: postgres://clockwork:clockwork@postgres:5432/clockwork?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      QUEUE_NAME: scheduled_jobs
      DLQ_NAME: scheduled_jobs_dlq
      SCAN_INTERVAL_SECONDS: "3"
      BATCH_SIZE: "25"
    depends_on:
      clockwork-api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      args:
        SERVICE: worker
    environment:
      DATABASE_URL: postgres://clockwork:clockwork@postgres:5432/clockwork?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      QUEUE_NAME: scheduled_jobs
      DLQ_NAME: scheduled_jobs_dlq
    depends_on:
      clockwork-api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      callback-service:
        condition: service_healthy

  callback-service:
    build:
      context: .
      args:
        SERVICE: callback-service
    environment:
      HTTP_ADDR: ":8082"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
